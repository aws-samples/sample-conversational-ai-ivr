AWSTemplateFormatVersion: '2010-09-09'
Description: 'AnyCompany IVR - API Gateway for Lambda Tools'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  LambdaStackName:
    Type: String
    Default: anycompany-ivr-lambdas
    Description: Name of the tool Lambda functions CloudFormation stack
  PaymentsLambdaStackName:
    Type: String
    Default: anycompany-ivr-payments-lambdas
    Description: Name of the payments Lambda functions CloudFormation stack

Resources:
  # ===========================================
  # REST API
  # ===========================================
  IVRApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub 'anycompany-ivr-api-${Environment}'
      Description: AnyCompany IVR API - Individual Tool Endpoints
      EndpointConfiguration:
        Types:
          - REGIONAL
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: anycompany-ivr

  # ===========================================
  # API DEPLOYMENT
  # ===========================================
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - LookupByPlatePostMethod
      - LookupByPlateOptionsMethod
      - LookupByCitationPostMethod
      - LookupByCitationOptionsMethod
      - LookupByAccountPostMethod
      - LookupByAccountOptionsMethod
      - GetBalancePostMethod
      - GetBalanceOptionsMethod
      - GetViolationDetailsPostMethod
      - GetViolationDetailsOptionsMethod
      - SubmitDisputePostMethod
      - SubmitDisputeOptionsMethod
      - CheckDisputeStatusPostMethod
      - CheckDisputeStatusOptionsMethod
      - BuildCartPostMethod
      - BuildCartOptionsMethod
      - InitiatePaymentPostMethod
      - InitiatePaymentOptionsMethod
    Properties:
      RestApiId: !Ref IVRApi
      Description: !Sub 'Deployment for ${Environment}'

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref IVRApi
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref Environment
      Description: !Sub '${Environment} Stage'
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ===========================================
  # API KEY & USAGE PLAN
  # ===========================================
  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn: ApiStage
    Properties:
      Name: !Sub 'anycompany-ivr-api-key-${Environment}'
      Description: API Key for AnyCompany IVR API
      Enabled: true
      StageKeys:
        - RestApiId: !Ref IVRApi
          StageName: !Ref Environment

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: ApiStage
    Properties:
      UsagePlanName: !Sub 'anycompany-ivr-usage-plan-${Environment}'
      Description: Usage plan for AnyCompany IVR API
      ApiStages:
        - ApiId: !Ref IVRApi
          Stage: !Ref Environment
      Throttle:
        BurstLimit: 500
        RateLimit: 200
      Quota:
        Limit: 10000
        Period: DAY

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

  # ===========================================
  # /account RESOURCE
  # ===========================================
  AccountResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref IVRApi
      ParentId: !GetAtt IVRApi.RootResourceId
      PathPart: account

  # ===========================================
  # /account/lookup-by-plate
  # ===========================================
  LookupByPlateResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref IVRApi
      ParentId: !Ref AccountResource
      PathPart: lookup-by-plate

  LookupByPlateOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref IVRApi
      ResourceId: !Ref LookupByPlateResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
        PassthroughBehavior: WHEN_NO_MATCH
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  LookupByPlatePostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref IVRApi
      ResourceId: !Ref LookupByPlateResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations'
          - LambdaArn:
              Fn::ImportValue: !Sub '${LambdaStackName}-${Environment}-LookupByPlateFunctionArn'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true

  LookupByPlateLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Fn::ImportValue: !Sub '${LambdaStackName}-${Environment}-LookupByPlateFunctionArn'
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${IVRApi}/*/POST/account/lookup-by-plate'

