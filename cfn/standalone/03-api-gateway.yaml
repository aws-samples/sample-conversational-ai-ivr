  ApiEndpoint:
    Description: API Gateway Endpoint URL
    Value: !Sub 'https://${IVRApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub '${AWS::StackName}-ApiEndpoint'
  ApiId:
    Description: API Gateway ID
    Value: !Ref IVRApi
    Export:
      Name: !Sub '${AWS::StackName}-ApiId'
  ApiKeyId:
    Description: API Key ID
    Value: !Ref ApiKey
    Export:
      Name: !Sub '${AWS::StackName}-ApiKeyId'
  LookupByPlateEndpoint:
    Value: !Sub 'https://${IVRApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/account/lookup-by-plate'
  LookupByCitationEndpoint:
    Value: !Sub 'https://${IVRApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/account/lookup-by-citation'
  LookupByAccountEndpoint:
    Value: !Sub 'https://${IVRApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/account/lookup-by-account'
  GetBalanceEndpoint:
    Value: !Sub 'https://${IVRApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/balance/get-balance'
  GetViolationDetailsEndpoint:
    Value: !Sub 'https://${IVRApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/balance/get-violation-details'
  SubmitDisputeEndpoint:
    Value: !Sub 'https://${IVRApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/disputes/submit'
  CheckDisputeStatusEndpoint:
    Value: !Sub 'https://${IVRApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/disputes/status'
  BuildCartEndpoint:
    Value: !Sub 'https://${IVRApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/payments/build-cart'
  InitiatePaymentEndpoint:
    Value: !Sub 'https://${IVRApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/payments/initiate'