AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Root: Amazon Connect + Bedrock AgentCore Gateway (OpenAPI target) + AppIntegrations MCP Server application
  + (optional) Amazon Q in Connect AI Agent stack. Two-phase deploy:
  Phase 1: DeployQAgents=false (default) -> creates infra and MCP app scaffold.
  Phase 2: After you associate Amazon Q domain to the Connect instance, deploy with DeployQAgents=true.

Parameters:
  InstanceAlias:
    Type: String
    Description: "Connect instance alias (also used as a naming prefix)."

  AgentCoreGatewayName:
    Type: String
    Default: c001-ivr-mcp-gw
    Description: "Short AgentCore Gateway name (<=21 chars) so GatewayId stays <=32 for MCP namespace."

  # AgentCore target (OpenAPI in S3)
  OpenApiSchemaBucket:
    Type: String
    Description: "S3 bucket containing the OpenAPI schema file for the AgentCore Gateway target."
  OpenApiSchemaKey:
    Type: String
    Description: "S3 key (path) to the OpenAPI schema file for the AgentCore Gateway target."

  # Existing REST API (used by your OpenAPI schema)
    Type: String
    Description: "Existing API Gateway REST API id."
    Type: String
    Default: dev
    Description: "API Gateway stage name (e.g., dev)."

  ApiGatewayApiKeyId:
    Type: String
    Description: "API Gateway API key *ID* (not the key value)."

  # Q Knowledge base documents (S3)
  KnowledgeBaseS3Bucket:
    Type: String
    Description: "S3 bucket containing KB docs."
  KnowledgeBaseS3Prefix:
    Type: String
    Default: ""
    Description: "Optional prefix. NOTE: AppIntegrations S3 source only supports bucket name; the prefix is used later for ingestion filters."

  # Nested templates
  ConnectInstanceTemplateUrl:
    Type: String
  ConnectConfigTemplateUrl:
    Type: String
  AgentCoreGatewayTemplateUrl:
    Type: String
  AgentCoreTargetTemplateUrl:
    Type: String
  BootstrapTemplateUrl:
    Type: String
  McpApplicationTemplateUrl:
    Type: String
    Description: "Nested template URL for creating the AppIntegrations MCP server application (ApplicationType=MCP_SERVER)."
  QAgentsTemplateUrl:
    Type: String
    Default: "https://example.com/qagents.yaml"
    Description: "Only used when DeployQAgents=true."

  McpApplicationName:
    Type: String
    Default: "mcp_tools"
    Description: "MCP server application name (display name)."

  BootstrapCodeS3Bucket:
    Type: String
  BootstrapCodeS3Key:
    Type: String

  DeployQAgents:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: "Set to true for Phase 2 (after Q domain association)."

  Locale:
    Type: String
    Default: en_US

Conditions:
  DoQAgents: !Equals [!Ref DeployQAgents, "true"]

Resources:
  ConnectInstanceStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Ref ConnectInstanceTemplateUrl
      Parameters:
        InstanceAlias: !Ref InstanceAlias

  BootstrapStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Ref BootstrapTemplateUrl
      Parameters:
        InstanceAlias: !Ref InstanceAlias
        ApiGatewayApiKeyId: !Ref ApiGatewayApiKeyId
        BootstrapCodeS3Bucket: !Ref BootstrapCodeS3Bucket
        BootstrapCodeS3Key: !Ref BootstrapCodeS3Key

  AgentCoreGatewayStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Ref AgentCoreGatewayTemplateUrl
      Parameters:
          AgentCoreGatewayName: !Ref AgentCoreGatewayName
          InstanceAlias: !Ref InstanceAlias
          ConnectInstanceArn: !GetAtt ConnectInstanceStack.Outputs.ConnectInstanceArn

  AgentCoreTargetStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: AgentCoreGatewayStack
    Properties:
      TemplateURL: !Ref AgentCoreTargetTemplateUrl
      Parameters:
        InstanceAlias: !Ref InstanceAlias
        GatewayId: !GetAtt AgentCoreGatewayStack.Outputs.GatewayId
        OpenApiSchemaBucket: !Ref OpenApiSchemaBucket
        OpenApiSchemaKey: !Ref OpenApiSchemaKey
        ApiKeyCredentialProviderArn: !GetAtt BootstrapStack.Outputs.ApiKeyCredentialProviderArn

  McpApplicationStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: AgentCoreGatewayStack
    Properties:
      TemplateURL: !Ref McpApplicationTemplateUrl
      Parameters:
        InstanceAlias: !Ref InstanceAlias
        GatewayId: !GetAtt AgentCoreGatewayStack.Outputs.GatewayId
        McpApplicationName: !Ref McpApplicationName

  ConnectConfigStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: ConnectInstanceStack
    Properties:
      TemplateURL: !Ref ConnectConfigTemplateUrl
      Parameters:
        InstanceAlias: !Ref InstanceAlias
        KnowledgeBaseS3Bucket: !Ref KnowledgeBaseS3Bucket
        KnowledgeBaseS3Prefix: !Ref KnowledgeBaseS3Prefix

  QAgentsStack:
    Condition: DoQAgents
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - ConnectConfigStack
      - McpApplicationStack
    Properties:
      TemplateURL: !Ref QAgentsTemplateUrl
      Parameters:
        InstanceAlias: !Ref InstanceAlias
        ConnectInstanceArn: !GetAtt ConnectInstanceStack.Outputs.ConnectInstanceArn
        Locale: !Ref Locale
        QInConnectAssistantId: !GetAtt ConnectConfigStack.Outputs.QInConnectAssistantId
        OrchestrationPromptId: !GetAtt ConnectConfigStack.Outputs.OrchestrationPromptId
        AssistantArn: !GetAtt ConnectConfigStack.Outputs.QInConnectAssistantArn
        #McpApplicationNamespace: !GetAtt AgentCoreGatewayStack.Outputs.GatewayId
        #McpApplicationName: !Ref McpApplicationName

Outputs:
  ConnectInstanceArn:
    Value: !GetAtt ConnectInstanceStack.Outputs.ConnectInstanceArn

  AgentCoreGatewayId:
    Value: !GetAtt AgentCoreGatewayStack.Outputs.GatewayId

  AgentCoreGatewayUrl:
    Value: !GetAtt AgentCoreGatewayStack.Outputs.GatewayUrl

  AgentCoreTargetId:
    Value: !GetAtt AgentCoreTargetStack.Outputs.GatewayTargetId

  ApiKeyCredentialProviderArn:
    Value: !GetAtt BootstrapStack.Outputs.ApiKeyCredentialProviderArn

  McpServerApplicationArn:
    Value: !GetAtt McpApplicationStack.Outputs.McpServerApplicationArn

  McpServerApplicationId:
    Value: !GetAtt McpApplicationStack.Outputs.McpServerApplicationId

  QInConnectAssistantId:
    Value: !GetAtt ConnectConfigStack.Outputs.QInConnectAssistantId

  OrchestrationPromptId:
    Value: !GetAtt ConnectConfigStack.Outputs.OrchestrationPromptId
